<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — SteerIn</title>
  <meta name="description" content="The page you are looking for does not exist.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    [data-theme="dark"] {
      --bg: #070B09; --text: #F1F7F4; --text-secondary: #8FA098;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.08);
      --green-border: rgba(34,197,94,0.12); --border: rgba(255,255,255,0.06);
    }
    [data-theme="light"] {
      --bg: #F5F7F5; --text: #0C1410; --text-secondary: #55685F;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.08);
      --green-border: rgba(34,197,94,0.12); --border: rgba(0,0,0,0.07);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .container { max-width: 480px; }
    .code {
      font-size: clamp(80px, 15vw, 140px); font-weight: 900;
      letter-spacing: -6px; line-height: 1;
      background: linear-gradient(135deg, #22c55e, #4ade80, #22d3ee);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 16px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { color: var(--text-secondary); font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 12px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: all 0.25s; border: none; cursor: pointer;
      font-family: inherit; background: var(--green); color: #000;
      box-shadow: 0 4px 24px rgba(34,197,94,0.25);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(34,197,94,0.35); }
    .links { margin-top: 20px; display: flex; gap: 24px; justify-content: center; }
    .links a { color: var(--text-secondary); font-size: 13px; text-decoration: none; transition: color 0.2s; }
    .links a:hover { color: var(--green); }
    html { -webkit-tap-highlight-color: transparent; }
    @supports (padding: env(safe-area-inset-left)) {
      body {
        padding-left: max(24px, env(safe-area-inset-left));
        padding-right: max(24px, env(safe-area-inset-right));
      }
    }
    @media (max-width: 640px) {
      body { padding: 16px; }
      h1 { font-size: 18px; }
      p { font-size: 14px; }
      .btn { min-height: 48px; padding: 12px 24px; }
      .links { flex-direction: column; gap: 16px; }
    }
    @media (max-width: 400px) {
      body { padding: 12px; }
      .code { letter-spacing: -4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
    <div class="links">
      <a href="/#features">Features</a>
      <a href="/#faq">FAQ</a>
      <a href="/privacy-policy/">Privacy</a>
    </div>
  </div>
  <script>
    const stored = localStorage.getItem('steerin-theme');
    if (stored) document.documentElement.setAttribute('data-theme', stored);
  </script>
</body>
</html>
