<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070B09"/>
      <stop offset="100%" style="stop-color:#0D1410"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Green accent orb -->
  <circle cx="900" cy="200" r="300" fill="rgba(34,197,94,0.08)" filter="blur(80px)"/>
  
  <!-- Logo area -->
  <rect x="80" y="200" width="80" height="80" rx="20" fill="#22c55e"/>
  <text x="120" y="258" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="48" fill="#070B09" text-anchor="middle">S</text>
  
  <!-- Brand name -->
  <text x="180" y="250" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" fill="#F1F7F4">SteerIn</text>
  
  <!-- Tagline -->
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="42" fill="#F1F7F4">
    Garasi Digital Privat
  </text>
  <text x="80" y="385" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="42" fill="#22c55e">
    untuk Mobil &amp; Motor
  </text>
  
  <!-- Description -->
  <text x="80" y="445" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#8FA098">
    Kelola servis, pantau kesehatan, catat trip, temukan bengkel
  </text>
  <text x="80" y="475" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="22" fill="#8FA098">
    — semua data tetap privat dan local-first.
  </text>
  
  <!-- Tags -->
  <rect x="80" y="520" width="140" height="36" rx="8" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="150" y="544" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#22c55e" text-anchor="middle">Local-first</text>
  
  <rect x="230" y="520" width="160" height="36" rx="8" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="310" y="544" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#22c55e" text-anchor="middle">Tanpa Tracker</text>
  
  <rect x="400" y="520" width="180" height="36" rx="8" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="490" y="544" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="#22c55e" text-anchor="middle">Mobil + Motor + EV</text>
  
  <!-- URL -->
  <text x="1120" y="590" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="18" fill="#6b7b73" text-anchor="end">steerin.app</text>
</svg>
